<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#edf0f5;
overflow-x:hidden;
}

.wrapper{
width:100%;
max-width:500px;
margin:auto;
padding:20px;
text-align:center;
}

.logo-title{
    margin-top:20px;
    margin-bottom:20px;
}

.logo-title img{
    width:100%;
    max-width:450px;
    display:block;
    margin:auto;
}

.form-image{
    margin-top:20px;
    margin-bottom:15px;
}

.form-image img{
    width:100%;
    display:block;
}

.login-box{
margin-top:30px;
}

.input-group{
position:relative;
margin-bottom:12px;
}

.input-group input{
width:100%;
height:60px;
border-radius:35px;
border:3px solid #7f7f7f;
background:#fff;
text-align:center;
font-size:18px;
outline:none;
}

.input-group span{
position:absolute;
left:0;
top:0;
width:70px;
height:60px;
background:#b6b6b6;
border-radius:35px 0 0 35px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

.login-btn{
width:92%;
height:55px;
border:none;
border-radius:35px;
background:#8e8e8e;
color:#fff;
font-size:28px;
font-weight:bold;
margin:10px auto 0;
display:block;
}

.register-btn{
width:92%;
height:55px;
margin:6px auto 0;
border:none;
border-radius:35px;
background:linear-gradient(#ffffff,#ececec);
color:#9c9c9c;
font-size:28px;
display:block;
}

.hero{
margin-top:20px;
}

.hero img{
width:100%;
max-width:420px;
display:block;
margin:auto;
}

@media(max-width:480px){

.title{
font-size:50px;
}

.subtitle{
font-size:32px;
}

.login-btn,
.register-btn{
font-size:28px;
}

}
</style>
</head>
<body>

<div class="wrapper">

<div class="logo-title">
    <img src="judul.png">
</div>

<div class="form-image">
    <img src="form.png">
</div>

<button class="login-btn">LOG IN</button>
<button class="register-btn">DAFTAR</button>

<div class="hero">
    <img src="model.png">
</div>

</div>

</body>
  </html>
