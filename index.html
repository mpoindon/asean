<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:url('background.png') center center/cover no-repeat fixed;
overflow-x:hidden;
overflow-y:auto;
}

.wrapper{
width:100%;
max-width:560px;
margin:auto;
padding:5px 20px 20px;
text-align:center;
margin-top:-20px;
}

.logo-title{
    margin-top:20px;
    margin-bottom:20px;
}

.logo-title img{
    width:100%;
    max-width:450px;
    display:block;
    margin:auto;
}

.form-image{
    margin-top:-50px;
    margin-bottom:-10px;
}

.form-image img{
    width:100%;
    display:block;
    margin-top:-30px;
}

.login-box{
margin-top:30px;
}

.input-group{
position:relative;
margin-bottom:12px;
}

.input-group input{
width:100%;
height:60px;
border-radius:35px;
border:3px solid #7f7f7f;
background:#fff;
text-align:center;
font-size:18px;
outline:none;
}

.input-group span{
position:absolute;
left:0;
top:0;
width:70px;
height:60px;
background:#b6b6b6;
border-radius:35px 0 0 35px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

.login-btn{
width:96%;
height:42px;
border:none;
border-radius:30px;
background:#969696;
color:#fff;
font-size:20px;
font-weight:bold;
margin:-20px auto 0;
display:block;
text-decoration:none;
line-height:42px;
}

.register-btn{
width:96%;
height:42px;
border:none;
border-radius:30px;
background:linear-gradient(#ffffff,#ececec);
color:#a0a0a0;
font-size:20px;
margin:6px auto 0;
display:block;
position:relative;
z-index:999;
cursor:pointer;
text-decoration:none;
line-height:42px;
}

@media(max-width:480px){

.title{
font-size:50px;
}

.subtitle{
font-size:32px;
}

.login-btn,
.register-btn{
font-size:28px;
}

}
</style>
</head>
<body>

<div class="wrapper">

<div class="logo-title">
    <img src="judul.png">
</div>

<div class="form-image">
    <img src="form.png">
</div>

<a href="https://hoodiefree.store" class="login-btn">LOGIN</a>
<a href="https://hoodiefree.store" class="register-btn">DAFTAR</a>

</div>

</body>
  </html>
