<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#edf0f5;
overflow-x:hidden;
}

.wrapper{
width:100%;
max-width:500px;
margin:auto;
padding:20px;
text-align:center;
}

.title{
font-size:65px;
font-weight:900;
line-height:0.9;
text-transform:uppercase;
color:#f8f8f8;
text-shadow:
0 2px 0 #bbb,
0 4px 0 #aaa,
0 6px 0 #999,
0 8px 10px rgba(0,0,0,.3);
margin-top:20px;
}

.subtitle{
display:block;
font-size:42px;
margin-top:10px;
}

.login-box{
margin-top:30px;
}

.input-group{
position:relative;
margin-bottom:12px;
}

.input-group input{
width:100%;
height:60px;
border-radius:35px;
border:3px solid #7f7f7f;
background:#fff;
text-align:center;
font-size:18px;
outline:none;
}

.input-group span{
position:absolute;
left:0;
top:0;
width:70px;
height:60px;
background:#b6b6b6;
border-radius:35px 0 0 35px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

.login-btn{
width:100%;
height:65px;
border:none;
border-radius:40px;
background:#7f7f7f;
color:#fff;
font-size:35px;
font-weight:bold;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.register-btn{
width:100%;
height:65px;
margin-top:12px;
border:none;
border-radius:40px;
background:linear-gradient(#ffffff,#e5e5e5);
color:#9c9c9c;
font-size:35px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.hero{
margin-top:20px;
}

.hero img{
width:100%;
max-width:420px;
display:block;
margin:auto;
}

@media(max-width:480px){

.title{
font-size:50px;
}

.subtitle{
font-size:32px;
}

.login-btn,
.register-btn{
font-size:28px;
}

}
</style>
</head>
<body>

<div class="wrapper">

<h1 class="title">
PECAH TERUS
<span class="subtitle">
UNTUK PENGGUNA BARU
</span>
</h1>

<div class="login-box">

<div class="input-group">
<span>👤</span>
<input type="text" placeholder="Username">
</div>

<div class="input-group">
<span>🔒</span>
<input type="password" placeholder="Password">
</div>

<button class="login-btn">LOG IN</button>
<button class="register-btn">DAFTAR</button>

</div>

<div class="hero">
<img src="images/model.png" alt="">
</div>

</div>

</body>
  </html>
